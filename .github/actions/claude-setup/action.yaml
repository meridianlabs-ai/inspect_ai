name: Claude agent environment
description: >-
  Provision inspect_ai so Claude Code agents can run pytest/mypy/ruff instead of
  falling back to static checks. Invoked by the reusable agent workflows in
  meridianlabs-ai/agents when present. Mirrors the env setup in build.yml's test
  job (upstream inlines setup rather than exposing a composite action, so there
  is nothing to delegate to). Lives on `meridian` only; it is therefore picked
  up by the dev agent (which checks out the default branch) but not the reviewer
  (which checks out the pristine-main-cut PR head) — see the agents repo's
  design/architecture.md.

  IMPORTANT: every step here MUST be a plain `run:` with NO post phase. The dev
  agent continues its run on a `main`-cut working branch which — since this
  action is meridian-only — does not contain this action's files. A nested
  action with a `post:` (e.g. astral-sh/setup-uv's cache save) fails at job
  teardown with "Can't find action.yml under .github/actions/claude-setup",
  because the runner re-reads the action definition from the now-switched
  working tree. So we install uv via its standalone script rather than the
  setup-uv action, and skip caching (the fork's CI doesn't cache uv either).

runs:
  using: composite
  steps:
    - name: Install uv and project
      shell: bash
      # Pin uv to build.yml's UV_VERSION. The installer drops uv in
      # ~/.local/bin; add it to GITHUB_PATH so later steps (the agent's
      # `uv run …`) find it. Editable install so the agent's src edits are
      # exercised by `uv run pytest`.
      run: |
        set -euo pipefail
        curl -LsSf https://astral.sh/uv/0.9.4/install.sh | sh
        echo "$HOME/.local/bin" >> "$GITHUB_PATH"
        export PATH="$HOME/.local/bin:$PATH"
        uv venv --python 3.11
        uv pip install -e ".[dev]"
