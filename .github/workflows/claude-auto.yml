# @auto autonomous loop for the meridianlabs-ai/inspect_ai fork.
# Lives on the `meridian` default branch (workflow_run + issue_comment both
# resolve from the default branch, so they fire here even though the PRs target
# pristine `main`). Independent of claude.yml (dev) and claude-review.yml.

name: Claude Auto

on:
  # Phase 1: react to CI (upstream's "Build", which runs on claude/* -> main PRs).
  workflow_run:
    workflows: ["Build"]
    types: [completed]
  # Phase 2/3: react to the reviewer's marker comment.
  issue_comment:
    types: [created]

jobs:
  ci-fix:
    if: >-
      github.event_name == 'workflow_run' &&
      github.event.workflow_run.conclusion == 'failure' &&
      github.event.workflow_run.event == 'pull_request' &&
      github.event.workflow_run.head_repository.full_name == github.repository
    uses: meridianlabs-ai/agents/.github/workflows/claude-auto.yml@main
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
      actions: read
    secrets:
      MARVIN_TOKEN: ${{ secrets.MARVIN_TOKEN }}
    with:
      head_branch: ${{ github.event.workflow_run.head_branch }}
      pr_number: ${{ github.event.workflow_run.pull_requests[0].number }}
      ci_run_id: ${{ github.event.workflow_run.id }}
      # Fork context (this fork is special; see claude.yml). Work only on the
      # existing PR branch; never commit to main/meridian or touch meridian-only
      # .github/workflows files. This fork's PRs are a review surface and are
      # NEVER merged here — a human promotes finished work upstream.
      append_system_prompt: >-
        Repo context: meridianlabs-ai/inspect_ai is a fork of
        UKGovernmentBEIS/inspect_ai (upstream); this PR's branch was cut from
        pristine `main`. Work only on this existing branch and push to it —
        never commit to `main` or `meridian` directly, and never modify
        meridian-only files under .github/workflows (claude.yml, claude-auto.yml,
        claude-review.yml, sync-upstream.yml). Verify per CLAUDE.md: install the
        project (pip install -e ".[dev]"), run pytest on tests you touched, then
        ruff check and mypy on changed files; if verification is impossible, say
        exactly what was not run. CHANGELOG: for product-functionality changes
        (not test/build-only) add a single-line entry under "## Unreleased" at
        the top of CHANGELOG.md (create that section if absent). This fork's PRs
        are a review surface only and are NEVER merged here.

  review-fix:
    if: >-
      github.event_name == 'issue_comment' &&
      github.event.issue.pull_request != '' &&
      contains(github.event.comment.body, '<!-- claude-review-summary -->')
    uses: meridianlabs-ai/agents/.github/workflows/claude-auto-review.yml@main
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
      actions: read
    secrets:
      MARVIN_TOKEN: ${{ secrets.MARVIN_TOKEN }}
    with:
      pr_number: ${{ github.event.issue.number }}
      comment_author: ${{ github.event.comment.user.login }}
      # Same fork context, plus: the "handoff" here means ready for a human to
      # promote upstream (fork PRs are never merged in-fork), not "ready to merge".
      append_system_prompt: >-
        Repo context: meridianlabs-ai/inspect_ai is a fork of
        UKGovernmentBEIS/inspect_ai (upstream); this PR's branch was cut from
        pristine `main`. Work only on this existing branch and push to it —
        never commit to `main` or `meridian` directly, and never modify
        meridian-only files under .github/workflows (claude.yml, claude-auto.yml,
        claude-review.yml, sync-upstream.yml). Verify per CLAUDE.md: install the
        project (pip install -e ".[dev]"), run pytest on tests you touched, then
        ruff check and mypy on changed files; if verification is impossible, say
        exactly what was not run. CHANGELOG: for product-functionality changes
        (not test/build-only) add a single-line entry under "## Unreleased" at
        the top of CHANGELOG.md (create that section if absent). IMPORTANT: this
        fork's PRs are a review surface and are NEVER merged here — finished work
        is promoted by a HUMAN opening an upstream PR from the same branch
        (gh pr create --repo UKGovernmentBEIS/inspect_ai --head
        meridianlabs-ai:BRANCH). So when you hand off, frame it as "ready for a
        human to promote upstream", not "ready to merge", and never merge.
