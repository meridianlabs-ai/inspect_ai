# Keeps the meridianlabs-ai/inspect_ai fork in sync with upstream:
#   - `main` is fast-forwarded to UKGovernmentBEIS/inspect_ai main (the
#     non-ff push rejection enforces that main stays a pristine mirror)
#   - `meridian` (default branch, carries meridian-only workflows) gets
#     upstream merged in; merge conflicts fail the run for a human to resolve
# Lives on the `meridian` default branch (schedule only fires from there).

name: Sync upstream

on:
  schedule:
    - cron: "17 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      # SYNC_TOKEN: fine-grained PAT (Contents R/W, this repo only) owned by a
      # repo admin. Pushes authenticate as that admin, which is what satisfies
      # the branch ruleset's admin-role bypass — the default GITHUB_TOKEN
      # cannot bypass it (GitHub Actions isn't an allowed bypass actor type
      # for repo rulesets).
      - uses: actions/checkout@v4
        with:
          ref: meridian
          fetch-depth: 0
          token: ${{ secrets.SYNC_TOKEN }}

      - name: Fast-forward main and merge into meridian
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git remote add upstream https://github.com/UKGovernmentBEIS/inspect_ai.git
          git fetch upstream main
          git push origin refs/remotes/upstream/main:refs/heads/main
          git merge upstream/main --no-edit
          git push origin meridian
