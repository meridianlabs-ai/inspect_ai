# Claude stub for the meridianlabs-ai/inspect_ai fork.
# Lives on the `meridian` default branch. Claude branches from and opens PRs
# against pristine `main` (which mirrors UKGovernmentBEIS/inspect_ai) so review
# diffs never include meridian infra commits. See the two-stage PR flow in the
# README.
#
# Triggers are limited to issue_comment + issues on purpose: GitHub resolves
# those from the default branch (meridian, where this file lives), but it
# resolves pull_request-family events (pull_request_review_comment,
# pull_request_review) from the PR's own branches — which here are `main` / a
# `main`-cut feature branch, neither of which carries this workflow. So those
# events can NEVER fire on the fork; including them would only advertise a
# trigger that does nothing. Mention @claude in a TOP-LEVEL comment (or use the
# `claude` label) — inline review-comment replies are not picked up here.

name: Claude

on:
  issue_comment:
    types: [created]
  issues:
    types: [opened, labeled]

jobs:
  claude:
    # Cheap gate to avoid spending runner minutes on unrelated events; the
    # action does its own authoritative trigger check.
    if: |
      contains(github.event.comment.body, '@claude') ||
      contains(github.event.issue.body, '@claude') ||
      contains(github.event.issue.title, '@claude') ||
      github.event.label.name == 'claude'
    uses: meridianlabs-ai/agents/.github/workflows/claude.yml@main
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
      actions: read
    with:
      base_branch: main
      # Fork-specific guidance. Goes through the reusable workflow's
      # append_system_prompt input (a single composed --append-system-prompt),
      # NOT claude_args — a second --append-system-prompt would collide with the
      # composed one. The fork can't ship a CLAUDE.md/AGENTS.md (main must stay
      # pristine and a file on meridian isn't on the main-cut work branches).
      append_system_prompt: >-
        Repo context: meridianlabs-ai/inspect_ai is a fork of
        UKGovernmentBEIS/inspect_ai (upstream). Branch `main` is a pristine
        mirror of upstream main: always branch from it and open PRs against it,
        never against the `meridian` branch, and never commit to `main` or
        `meridian` directly. Before opening a PR, verify your work per
        CLAUDE.md: install the project (pip install -e ".[dev]"), run pytest on
        the tests you added or touched, then ruff check and mypy on changed
        files; fix what they surface. If verification is impossible (a tool is
        blocked or the environment cannot be set up), state exactly what was not
        run in the PR description. When you finish implementing work from an
        issue, open a draft PR in this fork (base: main) with `gh pr create`
        rather than only linking a compare URL. Immediately after opening the
        PR, post a top-level comment of exactly `@review` on it (e.g.
        `gh pr comment <number> --body '@review'`) to request an automated
        review: auto-review-on-open does not fire on this fork, so this comment
        is what starts the reviewer. PRs within this fork are a
        review surface only and are never merged here; finished work is promoted
        by a human opening an upstream PR from the same branch (gh pr create
        --repo UKGovernmentBEIS/inspect_ai --head meridianlabs-ai:BRANCH). When
        asked to address feedback from an upstream PR, read its comments with gh
        (upstream is public) and push fixes to the same branch in this fork; the
        upstream PR updates automatically. Never modify files under
        .github/workflows that are meridian-only (claude.yml, sync-upstream.yml).
        CHANGELOG: for changes to product functionality (not for test-only or
        build-only changes) add a CHANGELOG entry. Put it in the "## Unreleased"
        section at the top of the file; if that section does not exist, create
        it. If "## Unreleased" already has entries, group the new entry with
        similar items if any, otherwise add it at the end of the list. The entry
        must be a single line and a single sentence.
      # Appended to the shared branch_sync_prompt (not replacing it) — adds the
      # CHANGELOG-merge check, which is fork-specific since the CHANGELOG
      # convention is. Fires only on PR follow-up runs, where the merge happens.
      branch_sync_append: >-
        If this branch added a CHANGELOG entry, review the merge result
        carefully: the default merge resolution can move your entry out of the
        "## Unreleased" section (e.g. under a released heading). After merging,
        always verify your CHANGELOG entry is still under "## Unreleased" and
        move it back if it was relocated.
