# Claude stub for the meridianlabs-ai/inspect_ai fork.
# Lives on the `meridian` default branch (event workflows only fire from the
# default branch). Claude branches from and opens PRs against pristine `main`
# (which mirrors UKGovernmentBEIS/inspect_ai) so review diffs never include
# meridian infra commits. See the two-stage PR flow in the README.

name: Claude

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  pull_request_review:
    types: [submitted]
  issues:
    types: [opened, labeled]

jobs:
  claude:
    # Cheap gate to avoid spending runner minutes on unrelated events; the
    # action does its own authoritative trigger check.
    if: |
      contains(github.event.comment.body, '@claude') ||
      contains(github.event.review.body, '@claude') ||
      contains(github.event.issue.body, '@claude') ||
      contains(github.event.issue.title, '@claude') ||
      github.event.label.name == 'claude'
    uses: meridianlabs-ai/agents/.github/workflows/claude.yml@main
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
      actions: read
    with:
      base_branch: main
      claude_args: >-
        --append-system-prompt 'Repo context: meridianlabs-ai/inspect_ai is a
        fork of UKGovernmentBEIS/inspect_ai (upstream). Branch `main` is a
        pristine mirror of upstream main: always branch from it and open PRs
        against it, never against the `meridian` branch, and never commit to
        `main` or `meridian` directly. Before opening a PR, verify your work
        per CLAUDE.md: install the project (pip install -e ".[dev]"), run
        pytest on the tests you added or touched, then ruff check and mypy on
        changed files; fix what they surface. If verification is impossible
        (a tool is blocked or the environment cannot be set up), state exactly
        what was not run in the PR description. When you finish implementing
        work from an issue, open a draft PR in this fork (base: main) with
        `gh pr create` rather than only linking a compare URL. PRs within this fork are a review
        surface only and are never merged here; finished work is promoted by a
        human opening an upstream PR from the same branch (gh pr create --repo
        UKGovernmentBEIS/inspect_ai --head meridianlabs-ai:BRANCH). When asked
        to address feedback from an upstream PR, read its comments with gh
        (upstream is public) and push fixes to the same branch in this fork;
        the upstream PR updates automatically. Never modify files under
        .github/workflows that are meridian-only (claude.yml,
        sync-upstream.yml).'
